version: "3.9"

networks:
  datanet:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [datanet]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
    networks: [datanet]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [datanet]

  postgres:
    image: postgres:16
    container_name: postgres_dwh
    environment:
      POSTGRES_DB: coca_dwh
      POSTGRES_USER: datauser
      POSTGRES_PASSWORD: datapass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks: [datanet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datauser -d coca_dwh"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: datauser
      MONGO_INITDB_ROOT_PASSWORD: datapass123
      MONGO_INITDB_DATABASE: coca_ml
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks: [datanet]

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: kafka_producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CSV_PATH: /app/data/dataset.csv
      TOPIC_VENTES: ventes
      TOPIC_CLIENTS: clients
    networks: [datanet]
    restart: on-failure

  quality:
    build:
      context: ./quality
      dockerfile: Dockerfile
    container_name: dq_validator
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_DSN: postgresql://datauser:datapass123@postgres:5432/coca_dwh
      DQ_THRESHOLD: "80"
    networks: [datanet]
    restart: on-failure

  # ── COUCHE 4 : Traitement distribué PySpark ─────────────────────────────────
  # Lit le CSV, nettoie avec IQR (approxQuantile Spark), calcule les KPIs
  # par région × mois et la tendance temporelle. Écrit dans PostgreSQL :
  #   fait_ventes_clean | kpi_ventes_region | kpi_tendance_temporelle
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark_processor
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      POSTGRES_DSN: postgresql://datauser:datapass123@postgres:5432/coca_dwh
      CSV_PATH: /app/data/dataset.csv
    networks: [datanet]
    restart: on-failure

  # ── COUCHE 5 : ML — Random Forest + K-Means ────────────────────────────────
  # Lit fait_ventes (chargé par quality), calcule kpis_agreg, prévisions
  # ml_forecasts et segmentation K-Means dans MongoDB.
  processing:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: data_processor
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      POSTGRES_DSN: postgresql://datauser:datapass123@postgres:5432/coca_dwh
      MONGO_URI: mongodb://datauser:datapass123@mongodb:27017/coca_ml?authSource=admin
    networks: [datanet]
    restart: on-failure

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: coca_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      POSTGRES_DSN: postgresql://datauser:datapass123@postgres:5432/coca_dwh
      FLASK_ENV: production
    networks: [datanet]
    restart: always
    